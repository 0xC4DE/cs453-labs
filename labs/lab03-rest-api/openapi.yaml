openapi: 3.0.3

info:
  title: Lab 3 - REST API with Express
  version: 1.0.0
  description: >
    A small in-memory items API that demonstrates Express routes,
    JSON request bodies, path parameters, and basic REST-style CRUD operations.

servers:
  - url: http://localhost:3000
    description: Local development server

paths:
  /health:
    get:
      summary: Health check
      description: Returns a simple status response to show that the server is running.
      responses:
        "200":
          description: Server is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok

  /items:
    get:
      summary: List items
      description: Returns all in-memory items.
      responses:
        "200":
          description: Item list response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListSuccessResponse"
              example:
                status: ok
                items:
                  - id: 1
                    name: keyboard
                    quantity: 10

    post:
      summary: Create item
      description: Creates a new item with a generated ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
            example:
              name: monitor
              quantity: 4
      responses:
        "200":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemSuccessResponse"
              example:
                status: ok
                item:
                  id: 1
                  name: monitor
                  quantity: 4
        "400":
          description: Missing or invalid request fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"
              examples:
                missingName:
                  summary: Name missing
                  value:
                    status: failure
                    error: Name must be in body
                invalidQuantity:
                  summary: Quantity missing or invalid
                  value:
                    status: failure
                    error: Quantity must be in body and a valid number

  /items/{id}:
    get:
      summary: Get item by ID
      description: Returns one item by ID.
      parameters:
        - name: id
          in: path
          required: true
          description: The item ID from the URL path.
          schema:
            type: string
            example: "1"
      responses:
        "200":
          description: Item found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemSuccessResponse"
              example:
                status: ok
                item:
                  id: 1
                  name: keyboard
                  quantity: 10
        "400":
          description: Invalid ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"
              example:
                status: failure
                error: id was not a number
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"
              example:
                status: failure
                error: item not found

    put:
      summary: Update item by ID
      description: Updates one or more item fields.
      parameters:
        - name: id
          in: path
          required: true
          description: The item ID from the URL path.
          schema:
            type: string
            example: "1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemRequest"
            example:
              quantity: 100
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemSuccessResponse"
              example:
                status: ok
                item:
                  id: 1
                  name: keyboard
                  quantity: 100
        "400":
          description: Invalid ID or invalid quantity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"
              examples:
                invalidId:
                  summary: Invalid ID
                  value:
                    status: failure
                    error: ID is not valid
                invalidQuantity:
                  summary: Invalid quantity
                  value:
                    status: failure
                    error: Quantity is not a number
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"
              example:
                status: failure
                error: ID not found

    delete:
      summary: Delete item by ID
      description: Deletes one item and returns the deleted object.
      parameters:
        - name: id
          in: path
          required: true
          description: The item ID from the URL path.
          schema:
            type: string
            example: "1"
      responses:
        "200":
          description: Item deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemSuccessResponse"
              example:
                status: ok
                item:
                  id: 1
                  name: keyboard
                  quantity: 100
        "400":
          description: Invalid ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"
              example:
                status: failure
                error: ID is not valid
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"
              example:
                status: failure
                error: ID not found

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required:
        - status

    Item:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: keyboard
        quantity:
          type: integer
          example: 10
      required:
        - id
        - name
        - quantity

    CreateItemRequest:
      type: object
      properties:
        name:
          type: string
          example: monitor
        quantity:
          oneOf:
            - type: integer
              example: 4
            - type: string
              example: "4"
      required:
        - name
        - quantity

    UpdateItemRequest:
      type: object
      properties:
        name:
          type: string
          example: monitor
        quantity:
          oneOf:
            - type: integer
              example: 100
            - type: string
              example: "100"
      additionalProperties: false

    ItemSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        item:
          $ref: "#/components/schemas/Item"
      required:
        - status
        - item

    ItemListSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
      required:
        - status
        - items

    FailureResponse:
      type: object
      properties:
        status:
          type: string
          example: failure
        error:
          type: string
          example: ID not found
      required:
        - status
        - error

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Not found
      required:
        - error